<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1917;
    --muted: #7a7870;
    --accent: #1a5fb4;
    --accent-bg: #e8f0fb;
    --accent-text: #1a4a8a;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.05);
  }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px;
    text-align: center;
  }

  header .school { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  header h1 { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.3; }
  header .meta { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 0; }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 20px;
  }

  .search-box label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  .search-box input, .search-box select {
    width: 100%;
    padding: 11px 14px;
    font-size: 15px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 12px;
  }
  .search-box input:last-child, .search-box select:last-child { margin-bottom: 0; }
  .search-box input:focus, .search-box select:focus { border-color: var(--accent); background: #fff; }
  .search-box input::placeholder { color: #bbb; }

  .hint { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.6; }
  .hint span { background: #ece9e0; padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; }

  .count { font-size: 13px; color: var(--muted); margin-bottom: 12px; padding-left: 2px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1), 0 6px 20px rgba(0,0,0,0.07); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); }

  .badge {
    background: var(--accent-bg);
    color: var(--accent-text);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 2px; }
  .field-val { font-size: 14px; color: var(--text); }
  .field-val.sbd { color: var(--accent); font-weight: 600; }

  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 36px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }
  .empty small { font-size: 13px; display: block; margin-top: 6px; }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 40px;
    padding: 0 16px;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 18px; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

function normDob(s) {
  const parts = s.split('/');
  if (parts.length !== 3) return s;
  return parts[0].padStart(2,'0') + '/' + parts[1].padStart(2,'0') + '/' + parts[2];
}

function removeDiacritics(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D').toLowerCase();
}

const lopSet = [...new Set(data.map(d => d.lop).filter(Boolean))].sort();
const sel = document.getElementById('lop');
lopSet.forEach(l => {
  const o = document.createElement('option');
  o.value = l; o.textContent = l;
  sel.appendChild(o);
});

function search() {
  const raw = document.getElementById('q').value.trim();
  const lop = document.getElementById('lop').value;
  const qNorm = removeDiacritics(raw);
  const qDob = normDob(raw);

  let results = data;
  if (lop) results = results.filter(d => d.lop === lop);
  if (raw) results = results.filter(d =>
    removeDiacritics(d.name).includes(qNorm) ||
    d.sbd.includes(raw) ||
    d.dob === qDob ||
    removeDiacritics(d.lop).includes(qNorm)
  );
  render(results, raw || lop);
}

function render(results, hasFilter) {
  const el = document.getElementById('results');
  if (!hasFilter) {
    el.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>Nhập thông tin để tìm kiếm thí sinh</p><small>Họ tên, số báo danh hoặc ngày sinh</small></div>`;
    return;
  }
  if (!results.length) {
    el.innerHTML = `<div class="empty"><div class="icon">😕</div><p>Không tìm thấy thí sinh phù hợp</p><small>Vui lòng kiểm tra lại thông tin</small></div>`;
    return;
  }
  el.innerHTML = `<p class="count">Tìm thấy ${results.length} thí sinh</p>` + results.map(d => `
    <div class="card">
      <div class="card-top">
        <span class="card-name">${d.name}</span>
        <span class="badge">Phòng thi số ${d.phong}</span>
      </div>
      <div class="card-grid">
        <div><div class="field-label">Số báo danh</div><div class="field-val sbd">${d.sbd}</div></div>
        <div><div class="field-label">Ngày sinh</div><div class="field-val">${d.dob}</div></div>
        <div><div class="field-label">Lớp</div><div class="field-val">${d.lop || '—'}</div></div>
        <div><div class="field-label">Số điện thoại</div><div class="field-val">${d.phone || '—'}</div></div>
      </div>
    </div>
  `).join('');
}

render([], false);
