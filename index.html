<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra Cứu Phòng Thi – THCS Trưng Vương 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
    --text: #1a1917; --muted: #7a7870;
    --accent: #1a5fb4; --accent-bg: #e8f0fb; --accent-text: #1a4a8a;
    --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.05);
  }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 24px 20px 20px; text-align: center; }
  header .school { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  header h1 { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.3; }
  header .meta { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 0; }
  .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
  .search-box label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .search-box input, .search-box select { width: 100%; padding: 11px 14px; font-size: 15px; font-family: inherit; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; margin-bottom: 12px; }
  .search-box input:last-child, .search-box select:last-child { margin-bottom: 0; }
  .search-box input:focus, .search-box select:focus { border-color: var(--accent); background: #fff; }
  .search-box input::placeholder { color: #bbb; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.6; }
  .hint span { background: #ece9e0; padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; }
  .count { font-size: 13px; color: var(--muted); margin-bottom: 12px; padding-left: 2px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px; margin-bottom: 10px; transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1), 0 6px 20px rgba(0,0,0,0.07); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .badge { background: var(--accent-bg); color: var(--accent-text); font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 2px; }
  .field-val { font-size: 14px; color: var(--text); }
  .field-val.sbd { color: var(--accent); font-weight: 600; }
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty .icon { font-size: 36px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }
  .empty small { font-size: 13px; display: block; margin-top: 6px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .error { background: #fff0f0; border: 1px solid #fcc; border-radius: var(--radius); padding: 16px; color: #c00; font-size: 14px; margin-bottom: 16px; }
  footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 40px; padding: 0 16px; }
  @media (max-width: 480px) { header h1 { font-size: 18px; } .card-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="school">Trường THCS Trưng Vương</div>
  <h1>Tra Cứu Phòng Thi Thử Vào Lớp 10</h1>
  <div class="meta" id="header-meta">Đang tải dữ liệu...</div>
</header>

<div class="container">
  <div id="error-box" style="display:none" class="error"></div>
  <div class="search-box">
    <label>Tìm kiếm thí sinh</label>
    <input type="text" id="q" placeholder="Nhập họ tên, số báo danh hoặc ngày sinh..." oninput="search()" autocomplete="off" disabled />
    <label>Lọc theo lớp</label>
    <select id="lop" onchange="search()" disabled>
      <option value="">-- Tất cả các lớp --</option>
    </select>
    <div class="hint">
      Ngày sinh chấp nhận: <span>5/9/2011</span> hoặc <span>05/09/2011</span> hoặc <span>5/09/2011</span>
    </div>
  </div>
  <div id="results"><div class="loading">Đang tải dữ liệu thí sinh...</div></div>
</div>

<footer><p>Hệ thống tra cứu phòng thi – THCS Trưng Vương</p></footer>

<script>
let data = [];

async function loadData() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('Không tìm thấy file data.json');
    const json = await res.json();
    data = json.thisinh || json;
    const meta = json.meta || {};
    document.getElementById('header-meta').textContent =
      (meta.ngaythi ? 'Ngày thi: ' + meta.ngaythi : '') +
      (meta.tongso ? '  |  Tổng số thí sinh: ' + meta.tongso : '  |  Tổng số thí sinh: ' + data.length);
    initLopFilter();
    document.getElementById('q').disabled = false;
    document.getElementById('lop').disabled = false;
    render([], false);
  } catch(e) {
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-box').innerHTML =
      '<strong>Lỗi tải dữ liệu:</strong> ' + e.message +
      '<br><small>Kiểm tra file data.json có cùng thư mục với index.html không.</small>';
    document.getElementById('results').innerHTML = '';
  }
}

function initLopFilter() {
  const lopSet = [...new Set(data.map(d => d.lop).filter(Boolean))].sort();
  const sel = document.getElementById('lop');
  lopSet.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; sel.appendChild(o); });
}

function normDob(s) {
  const parts = s.split('/');
  if (parts.length !== 3) return s;
  return parts[0].padStart(2,'0') + '/' + parts[1].padStart(2,'0') + '/' + parts[2];
}

function removeDiacritics(s) {
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D').toLowerCase();
}

function search() {
  const raw = document.getElementById('q').value.trim();
  const lop = document.getElementById('lop').value;
  const qNorm = removeDiacritics(raw);
  const qDob = normDob(raw);
  let results = data;
  if (lop) results = results.filter(d => d.lop === lop);
  if (raw) results = results.filter(d =>
    removeDiacritics(d.name).includes(qNorm) ||
    (d.sbd||'').includes(raw) ||
    d.dob === qDob ||
    removeDiacritics(d.lop).includes(qNorm)
  );
  render(results, raw || lop);
}

function render(results, hasFilter) {
  const el = document.getElementById('results');
  if (!hasFilter) {
    el.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>Nhập thông tin để tìm kiếm thí sinh</p><small>Họ tên, số báo danh hoặc ngày sinh</small></div>`;
    return;
  }
  if (!results.length) {
    el.innerHTML = `<div class="empty"><div class="icon">😕</div><p>Không tìm thấy thí sinh phù hợp</p><small>Vui lòng kiểm tra lại thông tin</small></div>`;
    return;
  }
  el.innerHTML = `<p class="count">Tìm thấy ${results.length} thí sinh</p>` + results.map(d => `
    <div class="card">
      <div class="card-top">
        <span class="card-name">${d.name}</span>
        <span class="badge">Phòng thi số ${d.phong}</span>
      </div>
      <div class="card-grid">
        <div><div class="field-label">Số báo danh</div><div class="field-val sbd">${d.sbd}</div></div>
        <div><div class="field-label">Ngày sinh</div><div class="field-val">${d.dob}</div></div>
        <div><div class="field-label">Lớp</div><div class="field-val">${d.lop||'—'}</div></div>
        <div><div class="field-label">Số điện thoại</div><div class="field-val">${d.phone||'—'}</div></div>
      </div>
    </div>
  `).join('');
}

loadData();
</script>
</body>
</html>
