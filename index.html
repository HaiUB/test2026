<head>

<title>Hệ Thống tra Cứu Phòng Thi - THPT Uông Bí 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1917;
    --muted: #7a7870;
    --accent: #1a5fb4;
    --accent-bg: #e8f0fb;
    --accent-text: #1a4a8a;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.05);
  }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px 12px;
    text-align: center;
  }

  header .logo {
    width: 60px;
    height: 60px;
    object-fit: contain;
    border-radius: 50%;
    margin-bottom: 8px;
  }

  header .school { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  header h1 { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.3; }
  header .meta { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .container { max-width: 680px; margin: 0 auto; padding: 16px 16px 0; }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
  }

  .search-box label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  .search-box input, .search-box select {
    width: 100%;
    padding: 10px 14px;
    font-size: 15px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 12px;
  }
  .search-box input:last-child, .search-box select:last-child { margin-bottom: 0; }
  .search-box input:focus, .search-box select:focus { border-color: var(--accent); background: #fff; }
  .search-box input::placeholder { color: #bbb; }

  .hint { font-size: 12px; color: var(--muted); margin-top: -4px; margin-bottom: 12px; line-height: 1.6; }
  .hint span { background: #ece9e0; padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; }

  .count { font-size: 13px; color: var(--muted); margin-bottom: 12px; padding-left: 2px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1), 0 6px 20px rgba(0,0,0,0.07); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  
  .stt {
    background: #ece9e0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }

  .badge {
    background: var(--accent-bg);
    color: var(--accent-text);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.02em;
    text-align: right;
  }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .scores-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* Đã chuyển thành 4 cột để chứa Tổng điểm */
    gap: 8px 16px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
  }

  .full-width { grid-column: 1 / -1; }

  .field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 2px; }
  .field-val { font-size: 14px; color: var(--text); }
  .field-val.sbd { color: var(--accent); font-weight: 600; }
  .field-val.school { color: red; font-weight: 600; }
  .field-val.score { color: #d946ef; font-weight: 600; }
  
  /* Tạo điểm nhấn cho Tổng điểm */
  .field-label.total { color: #e11d48; }
  .field-val.score.total { color: #e11d48; font-size: 15px; }

  .empty {
    text-align: center;
    padding: 24px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 36px; margin-bottom: 8px; }
  .empty p { font-size: 15px; }
  .empty small { font-size: 13px; display: block; margin-top: 4px; color: #a1a1a1; }

  footer {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 30px;
    padding: 0 16px;
  }
  
  footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  
  footer a:hover {
    text-decoration: underline;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 18px; }
    .card-grid { grid-template-columns: 1fr; }
    /* Trên điện thoại lưới điểm sẽ bẻ thành 2 cột để không bị hẹp */
    .scores-grid { grid-template-columns: 1fr 1fr; }
    .badge { text-align: left; }
  }
</style>
</head>

// --- HỆ THỐNG TỰ ĐỘNG XỬ LÝ VÀ CHUẨN HÓA DỮ LIỆU ---
const cleanStr = (val) => val !== undefined && val !== null ? String(val).trim().replace(/\s+/g, ' ') : '';

const data = rawData.map(row => {
    // Xử lý môn thi đăng ký
    let monThiArr = [];
    if (cleanStr(row[5]).toLowerCase() === 'x') monThiArr.push('Toán');
    if (cleanStr(row[6]).toLowerCase() === 'x') monThiArr.push('Văn');
    if (cleanStr(row[7]).toLowerCase() === 'x') monThiArr.push('Tiếng Anh');
    
    // Xử lý điểm để tính tổng tự động
    let sToan = cleanStr(row[10]);
    let sVan = cleanStr(row[11]);
    let sAnh = cleanStr(row[12]);

    let pToan = parseFloat(sToan.replace(',', '.'));
    let pVan = parseFloat(sVan.replace(',', '.'));
    let pAnh = parseFloat(sAnh.replace(',', '.'));

    let hasToan = !isNaN(pToan);
    let hasVan = !isNaN(pVan);
    let hasAnh = !isNaN(pAnh);

    let tongDiem = '-';
    // Tính tổng nếu có ít nhất 1 đầu điểm
    if (hasToan || hasVan || hasAnh) {
        let sum = (hasToan ? pToan : 0) + (hasVan ? pVan : 0) + (hasAnh ? pAnh : 0);
        tongDiem = Math.round(sum * 100) / 100; // Làm tròn 2 chữ số thập phân
    }
    
    return {
        sbd: cleanStr(row[0]),
        name: cleanStr(row[1]), 
        dob: cleanStr(row[2]),
        lop: cleanStr(row[3]),
        truong: cleanStr(row[4]),
        monThi: monThiArr.length > 0 ? monThiArr.join(', ') : '-',
        phone: cleanStr(row[8]) || '-',
        phong: parseInt(cleanStr(row[9])) || '',
        diemToan: sToan || '-',
        diemVan: sVan || '-',
        diemAnh: sAnh || '-',
        tongDiem: tongDiem
    };
});

function getThongTinPhongThi(room) {
  if (!room) return "Chưa xếp phòng";
  let className = "";
  let building = "";
  let floor = "";

  if (room >= 1 && room <= 12) {
    className = `10A${room}`;
    building = "Nhà G";
    floor = room <= 6 ? "Tầng 4" : "Tầng 3";
  } else if (room >= 13 && room <= 24) {
    className = `12A${room - 12}`;
    building = "Nhà G";
    floor = room <= 18 ? "Tầng 2" : "Tầng 1";
  } else if (room >= 25 && room <= 34) {
    className = `11A${room - 24}`;
    building = "Nhà E";
    floor = room <= 29 ? "Tầng 3" : "Tầng 2";
  } else if (room === 35 || room === 36) {
    className = ""; 
    building = "Nhà E"; floor = "Tầng 1";
  } else if (room === 37) {
    className = "11A11"; building = "Nhà E"; floor = "Tầng 1";
  } else if (room === 38) {
    className = "11A12"; building = "Nhà E"; floor = "Tầng 1";
  } else if (room === 39) {
    className = ""; building = "Nhà B"; floor = "Tầng 3";
  } else if ([40, 42, 43].includes(room)) {
    className = ""; building = "Nhà B"; floor = "Tầng 2";
  } else if ([41, 44].includes(room)) {
    className = ""; building = "Nhà B"; floor = "Tầng 1";
  } else {
    return `Phòng thi số ${room}`;
  }

  let classDisplay = className !== "" ? ` (${className})` : "";
  return `Phòng thi số ${room}${classDisplay} - ${building} - ${floor}`;
}

function initDropdown() {
    const selTruong = document.getElementById('truong');
    selTruong.innerHTML = ''; 

    const totalStudents = data.length;
    const formattedTotalCount = totalStudents < 10 ? `0${totalStudents}` : totalStudents;

    const defaultOption = document.createElement('option');
    defaultOption.value = "";
    defaultOption.textContent = `-- Tất cả các trường (${formattedTotalCount} thí sinh) --`;
    selTruong.appendChild(defaultOption);

    const truongSet = [...new Set(data.map(d => d.truong).filter(Boolean))].sort();
    truongSet.forEach(t => {
      const count = data.filter(d => d.truong === t).length;
      const formattedCount = count < 10 ? `0${count}` : count;
      
      const o = document.createElement('option');
      o.value = t; 
      o.textContent = `${t} (${formattedCount} thí sinh)`;
      selTruong.appendChild(o);
    });
}

function normDob(s) {
  if (!s) return "";
  const parts = s.split('/');
  if (parts.length !== 3) return s;
  return parts[0].padStart(2,'0') + '/' + parts[1].padStart(2,'0') + '/' + parts[2];
}

function removeDiacritics(s) {
  if (!s) return "";
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D').toLowerCase();
}

function search() {
  const raw = document.getElementById('q').value.trim();
  const truong = document.getElementById('truong').value;
  
  // TÌM KIẾM "XUYÊN KHOẢNG TRẮNG"
  const qNorm = removeDiacritics(raw).replace(/\s+/g, ''); 
  const qDob = normDob(raw);

  let results = data;
  
  if (truong) results = results.filter(d => d.truong === truong);
  
  if (raw) {
    results = results.filter(d => {
      const nameNorm = removeDiacritics(d.name).replace(/\s+/g, '');
      const lopNorm = removeDiacritics(d.lop).replace(/\s+/g, '');

      return nameNorm.includes(qNorm) ||
             d.sbd.includes(raw) ||
             d.dob === qDob ||
             (d.lop && lopNorm.includes(qNorm));
    });
  }
  
  render(results, raw || truong);
}

function render(results, hasFilter) {
  const el = document.getElementById('results');
  if (!hasFilter) {
    el.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>Nhập thông tin để tìm kiếm thí sinh</p><small>Họ tên, số báo danh hoặc ngày sinh</small></div>`;
    return;
  }
  if (!results.length) {
    el.innerHTML = `<div class="empty"><div class="icon">😕</div><p>Không tìm thấy thí sinh phù hợp</p><small>Vui lòng kiểm tra lại thông tin</small></div>`;
    return;
  }
  
  el.innerHTML = `<p class="count">Tìm thấy ${results.length} thí sinh</p>` + results.map((d, index) => `
    <div class="card">
      <div class="card-top">
        <span class="card-name"><span class="stt">STT: ${index + 1}</span> ${d.name}</span>
        <span class="badge">${getThongTinPhongThi(d.phong)}</span>
      </div>
      <div class="card-grid">
        <div><div class="field-label">Số báo danh</div><div class="field-val sbd">${d.sbd}</div></div>
        <div><div class="field-label">Ngày sinh</div><div class="field-val">${d.dob}</div></div>
        <div><div class="field-label">Lớp</div><div class="field-val">${d.lop || '—'}</div></div>
        <div><div class="field-label">Môn đăng ký</div><div class="field-val">${d.monThi}</div></div>
        <div><div class="field-label">Số điện thoại</div><div class="field-val">${d.phone}</div></div>
        <div class="full-width"><div class="field-label">Trường học</div><div class="field-val school">${d.truong}</div></div>
      </div>
      <div class="scores-grid">
        <div><div class="field-label">Điểm Toán</div><div class="field-val score">${d.diemToan}</div></div>
        <div><div class="field-label">Điểm Văn</div><div class="field-val score">${d.diemVan}</div></div>
        <div><div class="field-label">Điểm T.Anh</div><div class="field-val score">${d.diemAnh}</div></div>
        <div><div class="field-label total">Tổng điểm</div><div class="field-val score total">${d.tongDiem}</div></div>
      </div>
    </div>
  `).join('');
}

// Khởi chạy khi load trang
document.addEventListener("DOMContentLoaded", () => {
    initDropdown();
    search();
});
